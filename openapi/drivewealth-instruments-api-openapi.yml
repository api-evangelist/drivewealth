              type: string
              description: Can shares of another fund be exchanged into new and/or existing accounts or is the fund closed for exchange purchases.
              enum:
              - ALL
              - EXISTING_ONLY
              - CLOSED
              - RESTRICTIONS_APPLY
              - UNKNOWN
              example: ALL
            exchangeFee:
              type: string
              description: Are exchange fees charged on this fund and, if so, are they done on a percentage or fixed dollar basis.
              enum:
              - NO_EXCHANGE_FEE
              - PERCENTAGE
              - FIXED_DOLLAR
              - UNKNOWN
              example: PERCENTAGE
            exchangeFeePercentage:
              type: number
              description: The exchange fee percent charged.
              example: 10.5
            exchangeFeeAmount:
              type: integer
              description: The amount, in dollars, of the exchange fee charged.
              example: 0
            dividendFrequency:
              type: string
              description: The frequency dividends are paid out by the fund.
              enum:
              - MONTHLY
              - QUARTERLY
              - SEMI_ANNUALLY
              - ANNUALLY
              example: MONTHLY
            operatingExpenses:
              type: number
              description: Expenses paid by the shareholders each year as a percentage of the fund's value.
              example: 0.25
            portfolioTurnover:
              type: number
              description: Investment portfolio turnover rate.
              example: 10.7
            shortTermRedemptionRules:
              type: boolean
              description: Do Short-Term Redemption Fee fields apply for this fund.
              example: true
            shortTermRedemptionMinimumAmount:
              type: integer
              description: The minimum amount that the fund will charge as a short-term redemption fee.
              example: 0
            mergedSecurity:
              type: string
              description: The fund status code equal to closed - merged, the Security ID of the fund to which it was merged.
              example: '922908306'
            prospectusUrl:
              type: string
              description: The link to the fund prospectus.
              example: https://app.allfunds.com/docs/legal/fund/....
            managementFee:
              type: number
              description: The fund management fee.
              example: 0.15
            domicile:
              type: string
              description: The fund ISO 2 domicile code.
              example: GB
            summaryRiskIndicator:
              type: integer
              description: The fund risk reward indicator.
              minimum: 1
              maximum: 7
              enum:
              - 1
              - 2
              - 3
              - 4
              - 5
              - 6
              - 7
              example: 3
            UCITS:
              type: boolean
              description: True, if the investment funds regulated at European Union level.
              example: true
    instrumentISIN:
      description: An `International Securities Identification Number` (ISIN) uniquely identifies a security. Its structure is defined in ISO 6166. ISINs are commonly used when an Instrument does not have a `symbol`, such as Debt Instruments and Global Mutual Funds.
      type: string
      minLength: 12
      maxLength: 14
      example: US023135BX34
    Coupon:
      description: A coupon or coupon payment is the annual interest rate paid on a bond, expressed as a percentage of the face value and paid from issue date until maturity.
      type: object
      properties:
        couponType:
          description: The method by which the coupon rate of the instrument is determined.
          type: string
          enum:
          - UNKNOWN
          - SHORT_TERM_DISCOUNT
          - FIXED_RATE_-_UNCONFIRMED
          - ADJUSTABLE_RATE
          - ZERO_COUPON
          - FLOATING_RATE
          - INDEX_LINKED
          - STEPPED_COUPON
          - FIXED_RATE
          - STRIPPED_CONVERTIBLE
          - DEFERRED_INTEREST
          - FLOATING_RATE_@_FLOOR
          - STRIPPED_TAX_CREDIT
          - INVERSE_FLOATING
          - STRIPPED_COUPON_PRINCIPAL
          - LINKED_INVERSE_FLOATER
          - FLEXIBLE_RATE
          - ORIGINAL_ISSUE_DISCOUNT
          - STRIPPED_PRINCIPAL
          - RESERVE_CUSIP
          - VARIABLE_RATE
          - STRIPPED_COUPON
          - FLOATING_AUCTION_RATE
          - TAX_CREDIT
          - TAX_CREDIT_OID
          - STRIPPED_COUPON_PAYMENT
          - STEPPED_UP_STEPPED_DOWN
          - CREDIT_SENSITIVE
          - PAY_IN_KIND
          - RANGE
          - DIGITAL
          - RESET
          example: FIXED_RATE
          readOnly: true
        currentRateDate:
          description: The annual rate of interest currently applicable to the instrument.
          type: string
          format: date
          minLength: 0
          maxLength: 10
          example: '2018-05-10'
          readOnly: true
        dayCount:
          description: The method of calculating interest accrual associated with the instrument.
          type: string
          enum:
          - UNKNOWN_INTEREST_CALCULATION_METHOD
          - ACTUAL/ACTUAL
          - ACTUAL/360
          - 30/360
          - 30_DAYS_PER_MONTH_/_ACTUAL
          - ACTUAL/365_(FIXED)
          - CHANGEABLE
          - ACTUAL/365_(366_LEAP_YEAR_-_ISDA)
          - 30/360_(COMPOUNDED_INTEREST)
          - 30/365
          - FUTURE_DATA_-_NOT_AVAILABLE
          - HISTORICAL_DATA_-_NOT_AVAILABLE
          - 30/360_(ICMA)
          - ACTUAL/365_(366_LEAP_YEAR)
          - ACTUAL/364
          - BUS/252
          - 365/365
          - ACTUAL/ACTUAL_(ICMA)
          - 28/360
          - 30/360_US
          - 30/360_US_(NASD)
          - 30/360_BMA
          - 30/360_(ISDA)
          - 30/360_IT
          - 30/360_SIA
          - 30E/360
          - 30E/360_(ISDA)
          - 30E+/360
          - NL/365_(NO_LEAP_YEAR)
          - 7/360
          - 30/360_WITH_GROSS_UP
          - NOT_APPLICABLE
          example: 30/360
          readOnly: true
        benchmark:
          description: The identifier the index against which the interest rate for an Index Linked Bond is reset.
          type: string
          example: US CPI
          readOnly: true
        benchmarkFormula:
          description: The multiple in the floating rate formula that is applied to the benchmark in order to calculate the reset rate on a floating rate instrument.
          type: string
          example: '1.5'
          readOnly: true
        nextResetDate:
          description: The date of the next interest rate reset of the instrument
          type: string
          format: date
          example: '2018-05-10'
          readOnly: true
        minimumRate:
          description: The minimum interest rate that an instrument will pay.
          type: number
          format: double
          example: 0.05
          readOnly: true
        maximumRate:
          description: The maximum interest rate that an instrument will pay.
          type: number
          format: double
          example: 0.05
          readOnly: true
        firstCouponDate:
          description: The date on which the first payment of interest is made.
          type: string
          format: date
          example: '2018-05-10'
          readOnly: true
        nextCouponDate:
          description: The next date on which a payment of interest will be made.
          type: string
          format: date
          example: '2018-05-10'
          readOnly: true
        finalCouponDate:
          description: The date on which the final interest payment is scheduled to be made to owners of the security.
          type: string
          format: date
          example: '2018-05-10'
          readOnly: true
    FilterCriterion:
      type: object
      required:
      - field
      - operator
      - value1
      properties:
        field:
          description: The name of the field to be filtered on.
          type: string
          example: spRating
          enum:
          - id
          - ISIN
          - CUSIP
          - CINS
          - payFrequency
          - payFrequencyDescription
          - couponRate
          - maturityDate
          - spRating
          - assetClassCode
          - assetClassDescription
          - accrualDate
          - bidPrice
          - askPrice
          - meanPrice
          - askYieldToMaturity
          - bidYieldToMaturity
          - status
          - statusDescription
          - issuer.primaryName
          - issuer.country
          - issuer.domicileCountry
          - features.minimumInvestmentAmount
          - features.incrementalInvestmentAmount
          - coupon.dayCountDescription
          - coupon.couponTypeDescription
          - details.nextCouponDate
          - statusCode
          - longOnly
          - coupon.dayCount
          - coupon.couponType
          - coupon.nextCouponDate
          - sector
          - price
          - minimumAmount
          - orderBook.liquidityRetail
          - orderBook.liquidityInstitutional
          - orderBook.liquidityMicro
          - orderBook.onlyLiveQuotes
          - orderBook.price
          - orderBook.yieldToWorst
          - details.debtTypeDescription
          - denominationAmounts.incrementAmount
          - indicators.tradingRestrictionsType
        operator:
          description: 'Filters, operator`= equal to``!= not equal to``< less than``<= less than or equal to``> greater than``>= greater than or equal to``>< in between``() contains` '
          type: string
          enum:
          - '='
          - '!='
          - <
          - <=
          - '>='
          - '>'
          - '><'
          - ()
        value1:
          description: The value of the field that should be filtered
          type: string
          example: AA
        value2:
          description: The value of the field that should be filtered. Should be provided when filtering ranges (between "><")
          type: string
          example: A
    Indicators:
      description: Indicators that provide additional information about the security
      example:
        callIndicator: false
        convertibleIndicator: false
        defaultIndicator: false
        dtcIndicator: true
        oidIndicator: false
        putIndicator: false
        sinkIndicator: false
        tipsIndicator: false
        floaterIndicator: false
        traceEligible: true
        capitalizedIndicator: false
        childIndicator: false
        defeasanceIndicator: false
        equityLinkedNoteIndicator: false
        pikIndicator: false
        tenderExchangeOfferIndicator: false
        warrantsIndicator: false
        tradingRestrictionsType: None
      properties:
        callIndicator:
          description: Indicates if the security is eligible to be redeemed by the issuer on a call basis
          readOnly: true
          type: boolean
        convertibleIndicator:
          description: Specifies whether an issue is convertible or exchangeable
          readOnly: true
          type: boolean
        defaultIndicator:
          description: Specifies whether the security is in default or not
          readOnly: true
          type: boolean
        dtcIndicator:
          description: Indicates whether the security is acceptable for clearing by the DTCC.
          readOnly: true
          type: boolean
        oidIndicator:
          description: Specifies whether or not this issue qualifies for Original Issue Discount status
          readOnly: true
          type: boolean
        putIndicator:
          description: Indicates whether the security carries provisions that allow for redemption at the request of owners of the security
          readOnly: true
          type: boolean
        sinkIndicator:
          description: Indicates whether the security carries a sinking fund as part of its terms and conditions
          readOnly: true
          type: boolean
        tipsIndicator:
          description: Indicates whether the security is a Treasury Inflation Protected Security
          readOnly: true
          type: boolean
        traceEligible:
          description: Indicates whether the security is considered TRACE eligible for price reporting
          readOnly: true
          type: boolean
        capitalizedIndicator:
          description: Specifies whether a bond issuer has set aside some of the proceeds from a bond sale to cover a certain number of interest payments
          readOnly: true
          type: boolean
        childIndicator:
          description: Indicates whether the security is created as the result of a corporate action or other event (the child instrument) from a previously issued instrument (the parent)
          readOnly: true
          type: boolean
        defeasanceIndicator:
          description: Indicates whether the security contains a provision that voids a bond or loan when the borrower sets aside cash or bonds sufficient enough to service the borrower's debt (a process called defeasance)
          readOnly: true
          type: boolean
        equityLinkedNoteIndicator:
          description: Indicates whether the security is an Equity Linked Note
          readOnly: true
          type: boolean
        pikIndicator:
          description: Indicates whether the security carries provisions to make Payment In Kind (PIK) to owners of the security
          readOnly: true
          type: boolean
        tenderExchangeOfferIndicator:
          description: Indicates whether the security has an associated exchange or tender offer
          readOnly: true
          type: boolean
        warrantsIndicator:
          description: Indicates whether there is a warrant associated with the particular security
          readOnly: true
          type: boolean
        floaterIndicator:
          description: Indicates whether the security has a floating or adjustable rate issue
          readOnly: true
          type: boolean
        tradingRestrictionsType:
          description: Indicates whether any trading restrictions are in effect for the security
          enum:
          - None
          - 144A
          - REG_S
          - PRIVATE_PLACEMENT
          - ACCREDITED_INVESTORS
          - REG_D
          - SEC_ACT_OF_1933
          readOnly: true
          type: string
