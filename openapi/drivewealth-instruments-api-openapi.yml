        isOptionsEnabled:
          type: boolean
          example: true
          description: The ability to trade options for this equity instrument. Default is false, meaning it is not possible to trade options for this instrument.
        longOnly:
          type: boolean
          example: true
          description: The ability to short an Instrument. Default is true, meaning it is not possible to short the instrument.
        exchangeNickelSpread:
          type: boolean
          example: false
          description: If true, a limit order for this Instrument must be in increments of $0.05
        close:
          type: number
          example: 87.79
          description: The most recent closing price of the Instrument.
        enableExtendedHoursNotionalStatus:
          type: string
          example: INACTIVE
          description: The instruments eligibility for extended hours notional trading. This will default to INACTIVE.
        fundamentalDataModel:
          $ref: '#/components/schemas/fundamentalDataModel'
        type:
          deprecated: true
          type: string
          example: EQUITY
          description: The classification of the Instrument.
          enum:
          - EQUITY
          - ETF
          - ETN
          - ADR
          - ALTERNATIVE_ASSET
          - MUTUAL_FUND
        url:
          type: string
          example: http://investor.apple.com
          description: URL for the investor site of the instrument.
        closePrior:
          type: number
          example: 90.5
          description: The instruments closing price of the prior trading day.
        image:
          type: string
          example: http://syscdn.drivewealth.net/images/symbols/ms.png
          description: A publicly hosted image of the instruments logo.
        isPTP:
          type: boolean
          example: false
          description: True, if the Instrument is a publicly traded partnership (PTP).
    highPrice:
      type: number
      example: 86.85
      description: The highest price in the current trading day.
    InstrumentBase:
      type: object
      properties:
        symbol:
          $ref: '#/components/schemas/instrumentSymbol'
        name:
          type: string
          example: Morgan Stanley
          description: A friendly name of the Instrument, like the Company name for an equity
        orderSizeMax:
          type: number
          example: 20000
          description: The maximum share amount for any order of this Instrument.
        orderSizeMin:
          type: number
          example: 0.1
          description: The minimum share amount for any order of this Instrument.
        orderSizeStep:
          type: number
          example: 0.01
          description: Increment amount on order of this Instrument.
        id:
          $ref: '#/components/schemas/instrumentID'
        instrumentType:
          $ref: '#/components/schemas/instrumentType'
        exchange:
          type: string
          example: NYQ
          description: The stock exchange the instrument is listed on.
        status:
          $ref: '#/components/schemas/instrumentStatus'
        ISIN:
          $ref: '#/components/schemas/instrumentISIN'
        CUSIP:
          $ref: '#/components/schemas/instrumentCUSIP'
        settlementDays:
          type: integer
          description: Number of days for the instrument to settle
          example: 1
    openPrice:
      type: number
      example: 86.53
      description: Most recent opening price of the instrument.
    DebtInstrumentDetails:
      type: object
      allOf:
      - $ref: '#/components/schemas/InstrumentBase'
      properties:
        debtData:
          $ref: '#/components/schemas/DebtReferenceData'
    country:
      type: string
      example: US
      description: The ISO standard country alpha-2 code.
    instrumentSymbol:
      type: string
      nullable: true
      example: MS
      description: The ticker symbol of the Instrument. Debt Instruments and Global Mutual Funds do not have symbols and are referred to buy their `instrumentID` or `ISIN`.
    instrumentCUSIP:
      description: 'CUSIP stands for `Committee on Uniform Securities Identification Procedures`.

        A CUSIP number identifies most financial instruments, including: stocks of all registered U.S. and Canadian companies, commercial paper, and U.S. government and municipal bonds.

        The CUSIP system facilitates the clearance and settlement process of securities.

        CUSIP numbers consist of nine characters (including letters and numbers) that uniquely identify a company or issuer and the type of financial instrument.

        A similar system is used to identify foreign securities (`CUSIP International Numbering System or CINS`).

        CINS employs the same nine character identifier as CUSIP, but also contains a letter in the first position to signify the issuer''s country or geographic region.

        '
      type: string
      minLength: 9
      maxLength: 9
      example: E09876AA7
    OptionInstrumentDetails:
      type: object
      allOf:
      - $ref: '#/components/schemas/OptionInstrumentBase'
      properties:
        optionsData:
          type: object
          properties:
            rootSymbol:
              type: string
              example: AAPL
              description: Ticker symbol of the underlying instrument from which this Option is derived.
            rootId:
              type: string
              example: 3fb1e8a9-f7d5-4d90-95e2-43e7326b5636
              description: A unique ID created by DriveWealth to identify a specific Instrument that this Option is derived from.
            expirationDate:
              type: string
              example: '2018-09-18'
              description: The date the Option Contract will expire
              format: date
            optionType:
              type: string
              example: PUT
              description: Call or Put
              enum:
              - CALL
              - PUT
            strikePrice:
              type: number
              example: 16.5
              description: The strike price of the option.
            deliverable:
              type: number
              example: 100
              default: 100
              description: The deliverable unit, available for stock and index options, is the number of shares of the underlying stock with respect to one option contract.
            multiplier:
              type: number
              example: 100
              default: 100
              description: The premium/strike Multiplier, available for stock and index options, provides the premium/strike multiplier for an option contract.
    MutualFundInstrumentDetails:
      type: object
      allOf:
      - $ref: '#/components/schemas/InstrumentBase'
      properties:
        url:
          type: string
          example: http://investor.apple.com
          description: The URL to the investor information page or the prospectus.
        image:
          type: string
          example: http://syscdn.drivewealth.net/images/symbols/ms.png
          description: A publicly hosted image of the instruments logo.
        mutualFundData:
          type: object
          properties:
            fundFamily:
              type: string
              description: The name of the fund family. For example, "ABC Funds".
              example: Vanguard
            shareClass:
              type: string
              description: Identifies the share class of the fund. For example Class A, Class B, or Institutional.
              enum:
              - A
              - B
              - INST
              example: INST
            loadType:
              type: string
              description: Identifies how commissions are paid for the fund, if any.
              enum:
              - NO_LOAD
              - FRONT_END
              - BACK_END
              - LEVEL
              - HYBRID
              - OTHER
              example: NO_LOAD
            dccsEligible:
              type: boolean
              description: Indicates if the fund allows orders to be submitted through the NSCC DCC&S Defined Contribution Clearance and Settlement.
              example: true
            blueSkyStates:
              type: array
              description: State postal abbreviation for each state the fund has been registered in.
              example:
              - CA
              - NY
              - AZ
              items:
                type: string
            purchaseCutOff:
              type: string
              description: The cutoff time to accept a buy order and execute the same day.
              example: '16:00'
            redemptionCutOff:
              type: string
              description: The cutoff time to accept a sell order and execute the same day.
              example: '16:00'
            maximumPurchaseAmount:
              type: integer
              description: The maximum purchase amount in dollars the fund will allow.
              example: 10000000
            purchaseMinimums:
              type: object
              properties:
                minimumInitialTaxable:
                  type: integer
                  description: The minimum initial purchase amount, in dollars, the fund will allow for taxable accounts.
                  example: 500
                minimumInitialIRA:
                  type: integer
                  description: The minimum initial purchase amount, in dollars, the fund will allow for IRA accounts.
                  example: 500
                minimumInitialQualifiedPlans:
                  type: integer
                  description: The minimum initial purchase amount, in dollars, the fund will allow for qualified plans. This would include 401K, HSAs, etc.
                  example: 500
                minimumSubsequentTaxable:
                  type: integer
                  description: The minimum subsequent purchase amount, in dollars, the fund will allow for taxable accounts.
                  example: 100
                minimumSubsequentIRA:
                  type: integer
                  description: The minimum subsequent purchase amount, in dollars, the fund will allow for IRA accounts.
                  example: 100
                minimumSubsequentQualifiedPlans:
                  type: integer
                  description: 'The minimum subsequent purchase amount, in dollars, the fund will allow for qualified plans. This would include 401K, HSAs, etc. '
                  example: 100
                minimumSystematicPurchase:
                  type: integer
                  description: The minimum amount, in dollars, which will be allowed for systematic purchases.
                  example: 10
                minimumInitialExchange:
                  type: integer
                  description: The minimum initial purchase amount, in dollars, which will be allowed for exchange purchases.
                  example: 10
                minimumSubsequentExchange:
                  type: integer
                  description: The minimum subsequent purchase amount, in dollars, which will be allowed for exchange purchases.
                  example: 10
            fundType:
              type: string
              description: The type of mutual fund.
              enum:
              - MUTUAL_FUND
              - MONEY_MARKET
              - UIT
              - CLOSE_END
              - GIC
              - STABLE_VALUE
              - SEPARATE_ACCOUNT
              - BANK_COLLECTIVE_TRUST
              - OFFSHORE_NRA
              - BIC
              - 529_PLAN
              - OFFSHORE_US_DOLLAR
              - OFFSHORE_NON_US_DOLLAR
              - ANNUITY
              - UNKNOWN
              example: MUTUAL_FUND
            fundStatus:
              type: string
              description: Indicates if the fund is open or closed. Eligible values are Open, Closed - Liquidated, Closed - Merged.
              enum:
              - OPEN
              - LIQUIDATED
              - MERGED
              - UNKNOWN
              example: OPEN
            largeTradeNotificationRequired:
              type: boolean
              description: Does the fund required prior notification when large trades are being placed.
            largeTradeDollarThreshold:
              type: number
              description: At what dollar amount is prior trade notification.
              example: 1000000000
            redemptionFeePercentage:
              type: integer
              description: The percent charged for the non-short-term redemption.
              example: 0
            redemptionFeeAmount:
              type: integer
              description: The amount, in dollars, charged for the non-short-term redemption fee.
              example: 0
