              type: boolean
              description: Is the redemption of shares for this fund limited to specific dates and/or intervals.
            purchaseEligibility:
              type: string
              description: 'Can the fund be purchased by new and/or existing shareholders. Eligible values: All, Existing Only, Closed, Restrictions Apply (see Prospectus).'
              enum:
              - ALL
              - EXISTING_ONLY
              - CLOSED
              - RESTRICTIONS_APPLY
              - UNKNOWN
              example: ALL
