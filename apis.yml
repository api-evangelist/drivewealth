apis:
  - name: DriveWealth REST API
    description: >
      Primary REST API providing brokerage-as-a-service capabilities including account
      opening, user management, order execution, funding, portfolio management, reporting,
      and compliance for embedded investing applications.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.drivewealth.com/apis/reference/introduction
    baseURL: https://api.drivewealth.net
    tags:
      - REST
      - Brokerage
      - Trading
      - Account Management
      - Fractional Shares
    properties:
      - type: Documentation
        url: https://developer.drivewealth.com/apis/docs/opening-accounts
      - type: OpenAPI
        url: https://github.com/DriveWealth/dw-openapi
      - type: OpenAPI
        url: openapi/drivewealth-rest-openapi.yml

  - name: DriveWealth FIX API
    description: >
      Financial Information Exchange (FIX) protocol API for institutional-grade
      connectivity to DriveWealth's trading infrastructure.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.drivewealth.com/
    baseURL: https://fix.drivewealth.net
    tags:
      - FIX
      - Institutional
      - Trading
      - Financial Protocol
    properties:
      - type: Documentation
        url: https://developer.drivewealth.com/

