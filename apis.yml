aid: drivewealth
name: DriveWealth
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/drivewealth/refs/heads/main/apis.yml
created: 2026-06-12
modified: 2026-06-12
specificationVersion: "0.19"
description: >
  DriveWealth is a global B2B financial technology platform providing Brokerage-as-a-Service
  via a REST API, enabling fintechs, banks, broker-dealers, asset managers, and consumer brands
  to embed investing and trading experiences into their applications. The platform supports
  US equities, ETFs, mutual funds, fixed income, options, and fractional share trading starting
  at $1. DriveWealth powers account opening, KYC/AML compliance, portfolio management,
  order execution, funding operations, and reporting for 100+ partners worldwide. A FIX API
  is also available alongside the primary REST API for institutional connectivity.
tags:
